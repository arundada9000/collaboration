<!DOCTYPE html>
<html>
<head>
    <title>Introduction Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            color: #555;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Indresh Tharu</h2>
        <p>I am a student of BICTE 4th semester.</p>
        <p>I am passionate about web development.</p>
    </div>

</body>
</html>
